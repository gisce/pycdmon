name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install python-semantic-release==10.5.3 build==1.3.0 twine==6.1.0

      - name: Validate project
        run: |
          ruff check .
          pytest

      - name: Run Python Semantic Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
          PYPI_MASTER_TOKEN: ${{ secrets.PYPI_MASTER_TOKEN }}
        run: |
          export PYPI_TOKEN="${PYPI_TOKEN:-${PYPI_MASTER_TOKEN:-}}"
          semantic-release version
          if compgen -G "dist/*" > /dev/null; then
            semantic-release publish
            if [ -n "${PYPI_TOKEN}" ]; then
              twine upload --non-interactive -u __token__ -p "${PYPI_TOKEN}" dist/*
            else
              echo "No PyPI token configured; skipping PyPI publish"
            fi
          else
            echo "No distributions found in dist/; skipping publish steps"
          fi
